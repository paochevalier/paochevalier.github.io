<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paolo Chevalier</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --paper: rgba(255, 255, 255, 0.72);
      --text: #161616;
      --muted: #5f5f5a;
      --line: rgba(22, 22, 22, 0.12);
      --line-strong: rgba(22, 22, 22, 0.2);
      --accent: #161616;
      --accent-soft: #ecece7;
      --shadow: 8px 8px 0 rgba(22, 22, 22, 0.08);
    }

    html[data-theme="dark"] {
      --bg: #111111;
      --paper: rgba(24, 24, 24, 0.78);
      --text: #f2f2ee;
      --muted: #b9b9b1;
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.24);
      --accent: #f2f2ee;
      --accent-soft: #2a2a2a;
      --shadow: 8px 8px 0 rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(to right, rgba(22, 22, 22, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(22, 22, 22, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      line-height: 1.45;
    }

    html[data-theme="dark"] body {
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    a {
      color: inherit;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 42px;
      flex-wrap: wrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-left: auto;
    }

    .lang-switcher {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
    }

    html[data-theme="dark"] .lang-switcher {
      background: rgba(24, 24, 24, 0.7);
    }

    .lang-btn,
    .mail-btn,
    .download-btn,
    .theme-toggle {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      padding: 10px 14px;
      min-height: 42px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.92rem;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      box-shadow: 4px 4px 0 rgba(22, 22, 22, 0.06);
    }

    html[data-theme="dark"] .lang-btn,
    html[data-theme="dark"] .mail-btn,
    html[data-theme="dark"] .download-btn,
    html[data-theme="dark"] .theme-toggle,
    html[data-theme="dark"] .github-link {
      background: rgba(24, 24, 24, 0.78);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.24);
    }

    .lang-btn:hover,
    .mail-btn:hover,
    .download-btn:hover,
    .theme-toggle:hover,
    .github-link:hover {
      transform: translate(-2px, -2px);
      border-color: var(--line-strong);
      background: white;
    }

    html[data-theme="dark"] .lang-btn:hover,
    html[data-theme="dark"] .mail-btn:hover,
    html[data-theme="dark"] .download-btn:hover,
    html[data-theme="dark"] .theme-toggle:hover,
    html[data-theme="dark"] .github-link:hover {
      background: #1f1f1f;
    }

    .lang-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    html[data-theme="dark"] .lang-btn.active {
      background: #94948e;
      color: #111111;
      border-color: #94948e;
    }

    .theme-toggle {
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .github-link {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 4px 4px 0 rgba(22, 22, 22, 0.06);
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(280px, 460px) minmax(300px, 1fr);
      gap: 32px;
      align-items: end;
      margin-bottom: 34px;
    }

    .name-block {
      position: relative;
      padding-top: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 5.4rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hero-copy {
      max-width: 620px;
      padding: 18px 20px;
      border-left: 3px solid var(--accent);
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.3));
      backdrop-filter: blur(8px);
    }

    html[data-theme="dark"] .hero-copy {
      background: linear-gradient(180deg, rgba(24,24,24,0.72), rgba(24,24,24,0.46));
    }

    .intro,
    .contact-text {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
    }

    .contact-text {
      margin-top: 14px;
      color: var(--muted);
    }

    .hero-actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .viewer {
      position: relative;
    }

    .viewer-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .viewer-title {
      margin: 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .pdf-shell {
      position: relative;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.55));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    html[data-theme="dark"] .pdf-shell {
      background:
        linear-gradient(135deg, rgba(24,24,24,0.88), rgba(30,30,30,0.62));
    }

    .pdf-shell::before,
    .pdf-shell::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--accent);
      opacity: 0.08;
    }

    .pdf-shell::before {
      left: 0;
      top: 0;
    }

    .pdf-shell::after {
      right: 0;
      bottom: 0;
    }

    .pdf-frame {
      width: 100%;
      height: 78vh;
      min-height: 720px;
      border: 0;
      display: block;
      background: white;
    }

    .fallback {
      display: none;
    }

    @media (max-width: 860px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .viewer-meta {
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 14px 28px;
      }

      .topbar {
        margin-bottom: 26px;
      }

      .pdf-frame {
        height: 68vh;
        min-height: 540px;
      }

      .hero-copy {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">Dark</button>

      <div class="top-actions">
        <div class="lang-switcher" aria-label="Language switcher">
          <button class="lang-btn" data-lang="cat">CAT</button>
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="es">ESP</button>
          <button class="lang-btn active" data-lang="en">EN</button>
        </div>

        <a
          class="github-link"
          href="https://github.com/paochevalier"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub Paolo Chevalier"
          title="GitHub"
        >
          <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49C4 14.09 3.48 13.23 3.32 12.78c-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.54 7.54 0 0 1 8 3.8c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </a>
      </div>
    </div>

    <section class="hero">
      <div class="name-block">
        <h1>Paolo<br />Chevalier</h1>
      </div>

      <div class="hero-copy">
        <p class="intro" id="intro-text">While I am building a more dynamic page, here is my up to date curriculum vitae.</p>
        <p class="contact-text" id="contact-text">You can contact me by clicking this button.</p>
        <div class="hero-actions">
          <a class="mail-btn" id="mail-btn" href="mailto:paol.chevalier@gmail.com">Email me</a>
        </div>
      </div>
    </section>

    <section class="viewer">
      <div class="viewer-meta">
        <p class="viewer-title" id="viewer-title">Curriculum Vitae</p>
        <a class="download-btn" id="download-btn" href="./data/cv.pdf" download>Download PDF</a>
      </div>

      <div class="pdf-shell">
        <iframe
          class="pdf-frame"
          src="./data/cv.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
          title="Curriculum vitae PDF"
        ></iframe>
      </div>

      <div class="fallback" id="fallback-text"></div>
    </section>
  </div>

  <script>
    const translations = {
      en: {
        intro: "While I am building a more dynamic page, here is my up to date curriculum vitae.",
        contact: "You can contact me by clicking this button.",
        button: "Email me",
        viewer: "Curriculum Vitae",
        download: "Download PDF",
        fallback: ""
      },
      fr: {
        intro: "En attendant de construire une page plus dynamique, voici mon curriculum vitae à jour.",
        contact: "Vous pouvez me contacter en cliquant sur ce bouton.",
        button: "M’écrire par email",
        viewer: "Curriculum Vitae",
        download: "Télécharger le PDF",
        fallback: ""
      },
      cat: {
        intro: "Mentre espero construir una pàgina més dinàmica, aquí teniu el meu currículum vitae actualitzat.",
        contact: "Em podeu contactar fent clic en aquest botó.",
        button: "Escriure’m un correu",
        viewer: "Currículum Vitae",
        download: "Descarregar el PDF",
        fallback: ""
      },
      es: {
        intro: "Mientras construyo una página más dinámica, aquí tienen mi currículum vitae actualizado.",
        contact: "Pueden ponerse en contacto conmigo haciendo clic en este botón.",
        button: "Escribirme por correo",
        viewer: "Currículum Vitae",
        download: "Descargar el PDF",
        fallback: ""
      }
    };

    const introText = document.getElementById("intro-text");
    const contactText = document.getElementById("contact-text");
    const mailBtn = document.getElementById("mail-btn");
    const viewerTitle = document.getElementById("viewer-title");
    const downloadBtn = document.getElementById("download-btn");
    const fallbackText = document.getElementById("fallback-text");
    const buttons = document.querySelectorAll(".lang-btn");
    const themeToggle = document.getElementById("theme-toggle");

    function setLanguage(lang) {
      const t = translations[lang];
      introText.textContent = t.intro;
      contactText.textContent = t.contact;
      mailBtn.textContent = t.button;
      viewerTitle.textContent = t.viewer;
      downloadBtn.textContent = t.download;
      fallbackText.textContent = t.fallback;
      document.documentElement.lang = lang === "cat" ? "ca" : lang;

      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    setLanguage("en");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "Light" : "Dark";
      themeToggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    const savedTheme = localStorage.getItem("theme-mode") || "light";
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
      const nextTheme = currentTheme === "dark" ? "light" : "dark";
      localStorage.setItem("theme-mode", nextTheme);
      applyTheme(nextTheme);
    });
  </script>
</body>
</html>
